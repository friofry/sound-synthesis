name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  benchmark:
    runs-on: ubuntu-latest
    env:
      BENCH_REGRESSION_LIMIT: "15"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Benchmark base branch (PR only)
        if: github.event_name == 'pull_request'
        run: |
          git checkout "${{ github.event.pull_request.base.sha }}"
          npm ci
          npm run test:bench | tee bench-base.txt

      - name: Benchmark head branch (PR only)
        if: github.event_name == 'pull_request'
        run: |
          git checkout "${{ github.sha }}"
          npm ci
          npm run test:bench | tee bench-head.txt

      - name: Compare benchmark results (PR only)
        if: github.event_name == 'pull_request'
        run: |
          node scripts/compare-bench.mjs \
            --base bench-base.txt \
            --head bench-head.txt \
            --threshold "$BENCH_REGRESSION_LIMIT" \
            | tee bench-comparison.md

      - name: Benchmark current branch (push only)
        if: github.event_name != 'pull_request'
        run: npm run test:bench | tee bench-head.txt

      - name: Publish benchmark summary
        if: always()
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && [ -f bench-comparison.md ]; then
            cat bench-comparison.md >> "$GITHUB_STEP_SUMMARY"
          elif [ -f bench-head.txt ]; then
            echo "## Benchmark Results" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            cat bench-head.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload benchmark logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-logs
          path: |
            bench-base.txt
            bench-head.txt
            bench-comparison.md
          if-no-files-found: ignore

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run e2e tests
        run: npm run test:e2e

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore
